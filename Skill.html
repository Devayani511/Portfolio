<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Skills</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="skills.css">
    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: linear-gradient(135deg, #f4ede4, #f6d7b8);
    color: #333;
}

/* Container */
.container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 50px 20px;
}

/* Titles */
.title {
    font-size: 36px;
    color: #7a4d00;
    text-align: center;
    margin-bottom: 10px;
}

.subtitle {
    text-align: center;
    font-size: 16px;
    margin-bottom: 40px;
    color: #555;
}

/* Skills Grid */
.skills-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 30px;
}

/* Each Skill */
.skill {
    background: #fff;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    text-align: center;
    transition: transform 0.3s ease;
}

.skill:hover {
    transform: translateY(-10px);
}

/* Icons */
.skill i {
    font-size: 40px;
    color: #7a4d00;
    margin-bottom: 15px;
}

/* Skill Bar */
.skill-bar {
    background: #eee;
    height: 8px;
    width: 100%;
    border-radius: 6px;
    margin-top: 10px;
}

.skill-level {
    height: 100%;
    background: #7a4d00;
    width: 0;
    border-radius: 6px;
    animation: fillSkill 1.5s forwards;
}

/* Animation for filling bar */
@keyframes fillSkill {
    from { width: 0; }
    to { width: var(--width); }
}

/* Skill Name */
.skill h3 {
    margin-bottom: 10px;
    font-size: 18px;
}
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 80px;
    animation: fadeDown 1s ease-in-out;
}
.logo {
    font-size: 26px;
    font-weight: 700;
    color: #7a4d00;
}
nav a {
    margin: 0 15px;
    text-decoration: none;
    color: #333;
    font-weight: 500;
    transition: 0.3s;
}

nav a:hover {
    color: #7a4d00;
}

.contact-btn {
    padding: 8px 18px;
    border-radius: 25px;
    border: 2px solid #7a4d00;
    background: transparent;
    cursor: pointer;
    transition: 0.3s;
}

.contact-btn:hover {
    background: #d39529;
    color: white;
}

    </style>
</head>
<body>

   <header>
    <div class="logo">Devayani</div>
    <nav>
        <a href="index.html">Home</a>
        <a href="About.html">About</a>
        <a href="Skill.html">Skills</a>
        <a href="Service.html">Services</a>
        <a href="Blogs.html">Blogs</a>
        <button class="contact-btn"><a href="Contact.html">Contact Us</a></button>
    </nav>
</header>
<section class="skills-section">
    <div class="container">
        <h1 class="title">My Skills</h1>
        <p class="subtitle">Here are some of the technologies and tools I work with</p>

        <div class="skills-container">

            <div class="skill">
                <i class="fab fa-html5"></i>
                <h3>HTML</h3>
                <div class="skill-bar">
                    <div class="skill-level" style="width: 90%;"></div>
                </div>
            </div>

            <div class="skill">
                <i class="fab fa-css3-alt"></i>
                <h3>CSS</h3>
                <div class="skill-bar">
                    <div class="skill-level" style="width: 85%;"></div>
                </div>
            </div>

            <div class="skill">
                <i class="fab fa-js-square"></i>
                <h3>JavaScript</h3>
                <div class="skill-bar">
                    <div class="skill-level" style="width: 75%;"></div>
                </div>
            </div>
            <br>
            <div class="skill">
                <i class="fa-brands fa-java skill-icon"></i>
                <h3>Java</h3>
                <div class="skill-bar">
                    <div class="skill-level" style="width: 70%;"></div>
                </div>
            </div>

            <div class="skill">
                <i class="fab fa-git-alt"></i>
                <h3>Git</h3>
                <div class="skill-bar">
                    <div class="skill-level" style="width: 80%;"></div>
                </div>
            </div>

            <div class="skill">
                <i class="fa-brands fa-python skill-icon"></i>
                <h3>Python</h3>
                <div class="skill-bar">
                    <div class="skill-level" style="width: 80%;"></div>
                </div>
            </div>

        </div>
    </div>
</section>

</body>
</html>
